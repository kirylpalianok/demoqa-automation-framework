name: DemoQA Tests

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Wait for DB
        run: sleep 10

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Init DB schema and data
        run: |
          psql -h localhost -U postgres -d postgres <<EOF
          CREATE TABLE IF NOT EXISTS public.data (
              username TEXT,
              password TEXT,
              books TEXT
          );

          DELETE FROM public.data;

          INSERT INTO public.data (username, password, books)
          VALUES ('${{ secrets.TEST_USERNAME }}', '${{ secrets.TEST_PASSWORD }}', 'Some Book');
          EOF
        env:
          PGPASSWORD: postgres

      - name: Run tests
        run: mvn clean test -Ddb.url=jdbc:postgresql://localhost:5432/postgres -Ddb.user=postgres -Ddb.password.encrypted=iW6IqBc0Hhj5b0M4FfDo+w== -Dtest.secret=${{ secrets.TEST_SECRET }} -Dheadless=true

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin